<html>

<head>
    <title>Bank App</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        input {
            width: 250px;
            height: 25px;
            margin-left: 10px;
        }

        button {
            background-color: #3b3f45;
            color: white;
            border: none;
            padding: 12px 30px;
            margin: 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .balance {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h2>Bank App</h2>

    <label>Enter Transaction Amount</label>
    <input type="number" id="entered_amount_e1">

    <br>

    <button onclick="credit()">Credit</button>
    <button onclick="debit()">Debit</button>

    <div class="balance" id="current_balance_e1">
        0
    </div>

    <script>
        function credit() {
            var entered_amount_e1 = document.getElementById("entered_amount_e1").value;
            var current_balance_e1 = document.getElementById("current_balance_e1");

            var account_balance = parseInt(current_balance_e1.innerText) + parseInt(entered_amount_e1);
            current_balance_e1.innerHTML = parseInt(account_balance);
        }

        function debit() {
            var entered_amount_e1 = document.getElementById("entered_amount_e1").value;
            var current_balance_e1 = document.getElementById("current_balance_e1");

            var account_balance = parseInt(current_balance_e1.innerText) - parseInt(entered_amount_e1);
            if (account_balance < 0) {
                alert("Insufficient balance!");
            } else {
                current_balance_e1.innerHTML = parseInt(account_balance);
            }
        }
    </script>

</body>

</html>
