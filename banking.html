<html>

<head>
    <title>Bank App</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        input {
            width: 250px;
            height: 25px;
            margin-left: 10px;
        }

        button {
            background-color: #3b3f45;
            color: white;
            border: none;
            padding: 12px 30px;
            margin: 20px;
            font-size: 16px;
            border-radius: 5px;
        }

        .balance {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>

</head>

<body>

    <h2>Bank App</h2>

    <label>Enter Transaction Amount</label>
    <input type="number">

    <br>

    <button>Credit</button>
    <button>Debit</button>

    <div class="balance">
        Your Account Balance is : Rs.0
    </div>

</body>

</html>
